name: Build and Deploy PDFs to GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Write LaTeX version file
        if: steps.version.outputs.version != ''
        run: echo '\renewcommand{\lakversion}{${{ steps.version.outputs.version }}}' > lak/version.tex

      - name: Compile
        uses: xu-cheng/latex-action@v4
        with:
          texlive_version: 2026
          work_in_root_file_dir: true
          root_file: |
            lak/lak.tex
            cc/cc.tex
            cc-swe/cc-swe-mini.tex
            cc-swe/cc-swe-mini-print.tex

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ~0.15

      - name: Compile Typst
        run: typst compile --input version="${{ steps.version.outputs.version }}" lak-typst/lak.typ lak-typst/lak-typst.pdf

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            lak/lak.pdf
            cc/cc.pdf
            cc-swe/cc-swe-mini.pdf
            cc-swe/cc-swe-mini-print.pdf
            lak-typst/lak-typst.pdf

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p output
          cp lak/lak.pdf output/
          cp cc/cc.pdf output/
          cp cc-swe/cc-swe-mini.pdf output/
          cp cc-swe/cc-swe-mini-print.pdf output/
          cp lak-typst/lak-typst.pdf output/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: true
